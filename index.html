<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse | Live Dashboard</title>
    <style>
        /* CSS Styling - Dark Theme */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --green: #22c55e;
            --red: #ef4444;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 { font-size: 1.1rem; margin-top: 0; color: var(--text-dim); }

        /* Tables & Lists */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th { text-align: left; color: var(--text-dim); font-size: 0.85rem; padding: 10px; }
        td { padding: 12px 10px; border-top: 1px solid #334155; }

        .price-up { color: var(--green); font-weight: bold; }
        .price-down { color: var(--red); font-weight: bold; }

        .trending-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }

        .trending-item img { width: 24px; height: 24px; margin-right: 12px; border-radius: 50%; }

        .loader {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .refresh-btn {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CryptoPulse Live</h1>
        <div id="last-updated" style="font-size: 0.8rem; color: var(--text-dim);">Updating...</div>
        <button class="refresh-btn" onclick="fetchAllData()">Refresh</button>
    </header>

    <div id="loading" class="loader">Fetching Market Data...</div>

    <div id="main-content" style="display: none;">
        <!-- Gainers and Losers -->
        <div class="grid-layout">
            <div class="card">
                <h2>🚀 Top Gainers (24h)</h2>
                <table id="gainers-table">
                    <!-- Data injected here -->
                </table>
            </div>
            <div class="card">
                <h2>📉 Top Losers (24h)</h2>
                <table id="losers-table">
                    <!-- Data injected here -->
                </table>
            </div>
        </div>

        <!-- Trending and Main Market -->
        <div class="grid-layout">
            <div class="card">
                <h2>🔥 Trending Now</h2>
                <div id="trending-list">
                    <!-- Data injected here -->
                </div>
            </div>
            <div class="card">
                <h2>💰 Market Leaders</h2>
                <table id="market-table">
                    <!-- Data injected here -->
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://api.coingecko.com/api/v3";

    async function fetchAllData() {
        try {
            // Show loader
            document.getElementById('loading').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';

            // 1. Fetch Market Data (Top 100)
            const marketRes = await fetch(`${API_BASE}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h`);
            const markets = await marketRes.json();

            // 2. Fetch Trending Data
            const trendingRes = await fetch(`${API_BASE}/search/trending`);
            const trending = await trendingRes.json();

            updateUI(markets, trending.coins);

            // Hide loader
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('last-updated').innerText = "Last update: " + new Date().toLocaleTimeString();

        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById('loading').innerText = "Error loading data. CoinGecko has a rate limit, please wait a minute and refresh.";
        }
    }

    function updateUI(markets, trending) {
        // Handle Top Gainers & Losers (Sorted from Top 100)
        const sortedByChange = [...markets].sort((a, b) => b.price_change_percentage_24h - a.price_change_percentage_24h);
        
        const gainers = sortedByChange.slice(0, 5);
        const losers = sortedByChange.slice(-5).reverse();

        // Render Gainers
        renderMiniTable('gainers-table', gainers);
        // Render Losers
        renderMiniTable('losers-table', losers);
        // Render Market Leaders (Top 10)
        renderMiniTable('market-table', markets.slice(0, 10));

        // Render Trending
        const trendingList = document.getElementById('trending-list');
        trendingList.innerHTML = '';
        trending.slice(0, 7).forEach(item => {
            const coin = item.item;
            trendingList.innerHTML += `
                <div class="trending-item">
                    <img src="${coin.small}" alt="${coin.name}">
                    <div style="flex-grow:1">
                        <strong>${coin.name}</strong> <small style="color:var(--text-dim)">(${coin.symbol})</small>
                    </div>
                    <div>#${coin.market_cap_rank}</div>
                </div>
            `;
        });
    }

    function renderMiniTable(elementId, data) {
        const table = document.getElementById(elementId);
        table.innerHTML = `
            <tr>
                <th>Coin</th>
                <th>Price</th>
                <th>24h %</th>
            </tr>
        `;
        data.forEach(coin => {
            const change = coin.price_change_percentage_24h || 0;
            const colorClass = change >= 0 ? 'price-up' : 'price-down';
            table.innerHTML += `
                <tr>
                    <td style="display:flex; align-items:center; gap:8px;">
                        <img src="${coin.image}" width="20"> 
                        ${coin.symbol.toUpperCase()}
                    </td>
                    <td>$${coin.current_price.toLocaleString()}</td>
                    <td class="${colorClass}">${change.toFixed(2)}%</td>
                </tr>
            `;
        });
    }

    // Initial Load
    fetchAllData();

    // Auto refresh every 2 minutes (to avoid CoinGecko rate limits)
    setInterval(fetchAllData, 120000);
</script>

</body>
</html>
